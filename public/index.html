<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent BRVM</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0e0c;--bg2:#111612;--bg3:#181f1a;--border:rgba(74,222,128,.12);--border2:rgba(74,222,128,.25);--green:#4ade80;--red:#f87171;--amber:#fbbf24;--text:#e8f5e9;--text2:#6b8f72;--text3:#3a5240;--mono:'DM Mono',monospace;--sans:'Syne',sans-serif}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
    header{border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
    .logo{display:flex;align-items:center;gap:12px}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    h1{font-size:18px;font-weight:700;letter-spacing:.05em}
    .sub{font-size:12px;color:var(--text2);font-family:var(--mono)}
    .main{padding:28px 32px;max-width:1100px;margin:0 auto}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:24px}
    .btn{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;cursor:pointer;text-align:left;font-family:var(--sans);transition:.2s}
    .btn:hover{border-color:var(--border2);background:var(--bg3)}
    .btn .icon{font-size:20px;margin-bottom:8px;display:block}
    .btn .label{font-size:13px;font-weight:600;color:var(--text);display:block}
    .btn .hint{font-size:11px;color:var(--text2);font-family:var(--mono);margin-top:2px;display:block}
    .search{display:flex;gap:10px;margin-bottom:24px}
    .search input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:14px;color:var(--text);font-family:var(--mono);outline:none;transition:.2s}
    .search input:focus{border-color:var(--border2)}
    .search input::placeholder{color:var(--text3)}
    .search button{background:var(--green);color:#0a0e0c;border:none;border-radius:8px;padding:12px 22px;font-size:13px;font-weight:700;font-family:var(--sans);cursor:pointer;transition:.2s}
    .search button:hover{opacity:.85}
    .search button:disabled{opacity:.4;cursor:not-allowed}
    .tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:28px}
    .tag{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--text2);font-family:var(--mono);cursor:pointer;transition:.2s}
    .tag:hover{border-color:var(--green);color:var(--green)}
    #results{display:flex;flex-direction:column;gap:20px}
    .loading{display:flex;align-items:center;gap:12px;padding:20px;font-family:var(--mono);font-size:13px;color:var(--text2)}
    .spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .card-title{font-size:14px;font-weight:600;letter-spacing:.03em}
    .card-meta{font-family:var(--mono);font-size:11px;color:var(--text3)}
    table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:13px}
    th{padding:10px 16px;text-align:left;font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:400}
    td{padding:11px 16px;border-bottom:1px solid rgba(74,222,128,.05);color:var(--text)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--bg3)}
    .up{color:#4ade80}.down{color:#f87171}.neutral{color:var(--text2)}
    .pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--mono)}
    .pill-up{background:rgba(74,222,128,.1);color:#4ade80}
    .pill-down{background:rgba(248,113,113,.1);color:#f87171}
    .metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1px;background:var(--border)}
    .metric{background:var(--bg2);padding:20px}
    .m-label{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
    .m-value{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px}
    .m-var{font-size:13px;font-family:var(--mono)}
    .news-item{padding:16px 20px;border-bottom:1px solid var(--border)}
    .news-item:last-child{border-bottom:none}
    .news-cat{display:inline-block;font-size:10px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:3px;margin-bottom:7px}
    .cat-m{background:rgba(251,191,36,.1);color:var(--amber)}
    .cat-i{background:rgba(74,222,128,.1);color:var(--green)}
    .cat-s{background:rgba(129,140,248,.1);color:#818cf8}
    .cat-r{background:rgba(248,113,113,.1);color:var(--red)}
    .news-title{font-size:14px;font-weight:600;margin-bottom:5px}
    .news-resume{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:6px}
    .news-footer{font-family:var(--mono);font-size:11px;color:var(--text3)}
    .s-badge{padding:4px 12px;border-radius:4px;font-size:12px;font-family:var(--mono)}
    .s-h{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.3)}
    .s-b{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.3)}
    .s-n{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
    .analyse-body{padding:20px;font-size:14px;color:var(--text2);line-height:1.7}
    .points{list-style:none;margin-top:14px}
    .points li{padding:7px 0 7px 16px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:13px;color:var(--text);position:relative}
    .points li::before{content:'›';position:absolute;left:0;color:var(--green)}
    .points li:last-child{border-bottom:none}
    .err{padding:16px 20px;font-family:var(--mono);font-size:13px;color:var(--red);background:rgba(248,113,113,.05);border:1px solid rgba(248,113,113,.2);border-radius:8px}
    @media(max-width:600px){header,.main{padding:16px}.grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<header>
  <div class="logo">
    <div class="dot"></div>
    <div><h1>AGENT BRVM</h1><span class="sub">Bourse Régionale des Valeurs Mobilières · UEMOA</span></div>
  </div>
  <div class="sub" id="date"></div>
</header>
<main class="main">
  <div class="grid">
    <button class="btn" onclick="ask('Synthèse complète du marché BRVM aujourd\'hui : indices, top hausses, top baisses, volumes, sentiment.')"><span class="icon">⬡</span><span class="label">Synthèse marché</span><span class="hint">Vue globale du jour</span></button>
    <button class="btn" onclick="ask('Valeurs actuelles des indices BRVM : Composite, 30, Prestige. Variation du jour et YTD.')"><span class="icon">◈</span><span class="label">Indices</span><span class="hint">Composite · 30 · Prestige</span></button>
    <button class="btn" onclick="ask('Cours actuels des principales actions BRVM : ticker, société, cours, variation %, volume.')"><span class="icon">▦</span><span class="label">Cours actions</span><span class="hint">Toutes valeurs</span></button>
    <button class="btn" onclick="ask('Dernières actualités BRVM : résultats entreprises, nouvelles cotations, annonces.')"><span class="icon">◎</span><span class="label">Actualités</span><span class="hint">News du marché</span></button>
    <button class="btn" onclick="ask('Top hausses et top baisses BRVM cette semaine avec variations en %.')"><span class="icon">△▽</span><span class="label">Hausses/Baisses</span><span class="hint">Mouvements extrêmes</span></button>
    <button class="btn" onclick="ask('Dividendes annoncés ou versés par sociétés cotées BRVM 2025-2026.')"><span class="icon">◉</span><span class="label">Dividendes</span><span class="hint">2025 – 2026</span></button>
    <button class="btn" onclick="ask('IPO et nouvelles introductions en bourse BRVM : détails, valorisations, calendrier.')"><span class="icon">⬟</span><span class="label">IPO & cotations</span><span class="hint">Nouvelles entrées</span></button>
    <button class="btn" onclick="ask('Top 10 capitalisations boursières BRVM avec secteur et valeur en milliards FCFA.')"><span class="icon">◐</span><span class="label">Capitalisations</span><span class="hint">Top 10 BRVM</span></button>
  </div>
  <div class="search">
    <input type="text" id="q" placeholder="Ex: analyse SONATEL, obligations BRVM, secteur bancaire..." />
    <button id="sbtn" onclick="send()">Analyser →</button>
  </div>
  <div class="tags">
    <span class="tag" onclick="setQ('Analyse SONATEL BRVM : cours, résultats, dividendes, perspectives')">SONATEL</span>
    <span class="tag" onclick="setQ('Analyse ECOBANK BRVM : cours actuel, résultats récents')">ECOBANK</span>
    <span class="tag" onclick="setQ('Analyse CORIS BANK BRVM : cours, variation, performances')">CORIS BANK</span>
    <span class="tag" onclick="setQ('Secteur bancaire BRVM : comparatif banques cotées, valorisation')">Secteur bancaire</span>
    <span class="tag" onclick="setQ('Obligations cotées BRVM : émetteurs, taux, maturité')">Obligations</span>
    <span class="tag" onclick="setQ('Volumes transactions BRVM cette semaine et liquidité du marché')">Volumes</span>
  </div>
  <div id="results"></div>
</main>
<script>
document.getElementById('date').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')send()});
function setQ(t){document.getElementById('q').value=t;document.getElementById('q').focus()}
function ask(q){document.getElementById('q').value=q;send()}
function vc(v){const n=parseFloat(v);return n>0?'up':n<0?'down':'neutral'}
function pc(v){const n=parseFloat(v);return n>0?'pill pill-up':n<0?'pill pill-down':'pill'}
function cc(c){const m={'marché':'cat-m','IPO':'cat-i','société':'cat-s','réglementation':'cat-r'};return'news-cat '+(m[c]||'')}
async function send(){
  const q=document.getElementById('q').value.trim();
  if(!q)return;
  const btn=document.getElementById('sbtn');
  const res=document.getElementById('results');
  btn.disabled=true;btn.textContent='...';
  res.innerHTML='<div class="loading"><div class="spinner"></div>Recherche en cours sur la BRVM...</div>';
  try{
    const r=await fetch('/api/brvm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Erreur serveur');
    res.innerHTML='';
    res.appendChild(render(d));
  }catch(e){
    res.innerHTML=`<div class="err">Erreur : ${e.message}</div>`;
  }finally{btn.disabled=false;btn.textContent='Analyser →'}
}
function render(d){
  const w=document.createElement('div');
  if(d.type==='indices'){
    w.innerHTML=`<div class="card"><div class="card-header"><span class="card-title">Indices BRVM</span><span class="card-meta">${d.updated||''}</span></div><div class="metric-grid">${(d.items||[]).map(it=>`<div class="metric"><div class="m-label">${it.nom}</div><div class="m-value">${it.valeur}</div><div class="m-var ${vc(it.variation_pct)}">${it.variation_pct||'—'}${it.ytd?` <span style="color:var(--text3)">YTD ${it.ytd}</span>`:''}</div>${it.description?`<div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:6px">${it.description}</div>`:''}</div>`).join('')}</div></div>`;
  }else if(d.type==='cours'){
    w.innerHTML=`<div class="card"><div class="card-header"><span class="card-title">Cours des actions</span><span class="card-meta">${d.updated||''}</span></div><div style="overflow-x:auto"><table><thead><tr><th>Ticker</th><th>Société</th><th>Secteur</th><th style="text-align:right">Cours</th><th style="text-align:right">Variation</th><th style="text-align:right">Volume</th></tr></thead><tbody>${(d.items||[]).map(it=>`<tr><td style="font-weight:500;color:var(--green)">${it.ticker||''}</td><td>${it.societe||''}</td><td style="color:var(--text2)">${it.secteur||''}</td><td style="text-align:right">${it.cours||'—'}</td><td style="text-align:right"><span class="${pc(it.variation_pct)}">${it.variation_pct||'—'}</span></td><td style="text-align:right;color:var(--text2)">${it.volume||'—'}</td></tr>`).join('')}</tbody></table></div></div>`;
  }else if(d.type==='news'){
    w.innerHTML=`<div class="card"><div class="card-header"><span class="card-title">Actualités BRVM</span></div>${(d.items||[]).map(it=>`<div class="news-item">${it.categorie?`<span class="${cc(it.categorie)}">${it.categorie}</span>`:''}<div class="news-title">${it.titre}</div><div class="news-resume">${it.resume}</div><div class="news-footer">${it.source||''}${it.date?' · '+it.date:''}</div></div>`).join('')}</div>`;
  }else if(d.type==='synthese'){
    const sc={haussier:'s-h',baissier:'s-b',neutre:'s-n'}[d.sentiment]||'s-n';
    w.innerHTML=`<div class="card"><div class="card-header"><span class="card-title">Synthèse du marché</span><span class="s-badge ${sc}">${d.sentiment||'neutre'}</span></div>${d.resume_marche?`<div class="analyse-body">${d.resume_marche}</div>`:''}<div class="metric-grid">${(d.indices||[]).map(it=>`<div class="metric"><div class="m-label">${it.nom}</div><div class="m-value">${it.valeur||'—'}</div><div class="m-var ${vc(it.variation_pct)}">${it.variation_pct||''}</div></div>`).join('')}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)"><div style="background:var(--bg2);padding:16px 20px"><div style="font-size:11px;color:var(--green);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px">▲ Top hausses</div>${(d.top_hausses||[]).map(it=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;font-family:var(--mono)">${it.ticker} <span style="color:var(--text2)">${it.societe||''}</span></span><span class="up" style="font-size:13px;font-family:var(--mono);font-weight:500">${it.variation_pct}</span></div>`).join('')}</div><div style="background:var(--bg2);padding:16px 20px"><div style="font-size:11px;color:var(--red);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px">▼ Top baisses</div>${(d.top_baisses||[]).map(it=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;font-family:var(--mono)">${it.ticker} <span style="color:var(--text2)">${it.societe||''}</span></span><span class="down" style="font-size:13px;font-family:var(--mono);font-weight:500">${it.variation_pct}</span></div>`).join('')}</div></div>${(d.news_cles||[]).length?`<div>${d.news_cles.map(n=>`<div class="news-item"><div class="news-title">${n.titre}</div><div class="news-resume">${n.resume}</div></div>`).join('')}</div>`:''}</div>`;
  }else{
    w.innerHTML=`<div class="card"><div class="analyse-body"><b>${d.titre||'Analyse'}</b><br><br>${d.contenu||''}${(d.points_cles||[]).length?`<ul class="points">${d.points_cles.map(p=>`<li>${p}</li>`).join('')}</ul>`:''}</div></div>`;
  }
  return w;
}
</script>
</body>
</html>
